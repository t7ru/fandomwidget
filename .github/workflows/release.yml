name: Build and Release

on:
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod

            - name: Build
              run: |
                  GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/fandomwidget.exe .
                  GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/fandomwidget .

            - name: Package Windows
              run: |
                  mkdir -p dist/windows
                  cp dist/fandomwidget.exe dist/windows/
                  cp README.md config.example.json widget-sample.json LICENSE dist/windows/
                  cd dist/windows && zip -r ../../fandomwidget-windows-amd64.zip .

            - name: Package Linux
              run: |
                  mkdir -p dist/linux
                  cp dist/fandomwidget dist/linux/
                  cp README.md config.example.json widget-sample.json LICENSE dist/linux/
                  cd dist/linux && tar -czf ../../fandomwidget-linux-amd64.tar.gz .

            - uses: softprops/action-gh-release@v3
              with:
                  tag_name: build-${{ github.run_number }}
                  name: build-${{ github.run_number }}
                  files: |
                      fandomwidget-windows-amd64.zip
                      fandomwidget-linux-amd64.tar.gz
